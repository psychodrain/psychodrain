<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@psychodrain</title>
    <!-- Подключаем Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Подключаем CSS для YTPlayer -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jquery.mb.YTPlayer/3.3.9/css/jquery.mb.YTPlayer.min.css">
    <style>
        /* Стили для страницы */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: #000;
        }

        /* Затемнение поверх видео */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
            pointer-events: none;
        }

        /* КНОПКА ЗВУКА В ЛЕВОМ ВЕРХНЕМ УГЛУ - ТОЛЬКО КНОПКА */
        .sound-button {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: white;
            font-size: 20px;
            cursor: pointer;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            
            /* Белое неоновое свечение */
            box-shadow: 
                0 0 15px rgba(255, 255, 255, 0.5),
                0 0 30px rgba(255, 255, 255, 0.3),
                inset 0 0 8px rgba(255, 255, 255, 0.3);
        }

        .sound-button:hover {
            transform: scale(1.1);
            background: rgba(40, 40, 50, 0.9);
            box-shadow: 
                0 0 25px rgba(255, 255, 255, 0.8),
                0 0 50px rgba(255, 255, 255, 0.5);
            border-color: rgba(255, 255, 255, 0.8);
        }

        /* ПАНЕЛЬКА - ТЕМНАЯ/ЧЕРНАЯ И ПОЛУПРОЗРАЧНАЯ */
        .container {
            background: rgba(10, 10, 15, 0.75);
            backdrop-filter: blur(12px);
            padding: 2rem;
            border-radius: 30px;
            text-align: center;
            max-width: 380px;
            width: 90%;
            margin: 20px;
            position: relative;
            z-index: 2;
            
            /* БЕЛОЕ НЕОНОВОЕ СВЕЧЕНИЕ НА ТЕМНОМ ФОНЕ */
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 
                0 0 30px rgba(255, 255, 255, 0.3),
                0 0 60px rgba(255, 255, 255, 0.15),
                0 0 90px rgba(255, 255, 255, 0.1),
                inset 0 0 20px rgba(255, 255, 255, 0.1);
            
            /* Анимация пульсации */
            animation: whiteNeonPulse 4s ease-in-out infinite;
        }

        @keyframes whiteNeonPulse {
            0%, 100% {
                box-shadow: 
                    0 0 30px rgba(255, 255, 255, 0.3),
                    0 0 60px rgba(255, 255, 255, 0.15),
                    0 0 90px rgba(255, 255, 255, 0.1),
                    inset 0 0 20px rgba(255, 255, 255, 0.1);
            }
            50% {
                box-shadow: 
                    0 0 50px rgba(255, 255, 255, 0.5),
                    0 0 100px rgba(255, 255, 255, 0.3),
                    0 0 150px rgba(255, 255, 255, 0.2),
                    inset 0 0 30px rgba(255, 255, 255, 0.15);
            }
        }

        h1 {
            color: white;
            margin-bottom: 0.3rem;
            font-size: 2rem;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            letter-spacing: 1px;
        }

        p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 1.5rem;
            font-size: 1rem;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
        }

        .social-links {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 0.8rem;
            border-radius: 40px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .social-link:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.4);
            filter: brightness(1.2);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .social-link i {
            font-size: 1.2rem;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.3));
        }

        /* Индивидуальные цвета соцсетей с легкой прозрачностью */
        .telegram { background: rgba(0, 136, 204, 0.8); }
        .youtube { background: rgba(255, 0, 0, 0.8); }
        .tiktok { background: rgba(0, 0, 0, 0.8); }
        .vkontakte { background: rgba(76, 117, 163, 0.8); }
        .soundcloud { background: rgba(255, 119, 0, 0.8); }
    </style>
</head>
<body>
    <!-- YouTube фон со звуком -->
    <div class="ytplayer" data-property="{
        videoURL: 'https://www.youtube.com/watch?v=WPxd8Ng9-x0',
        containment: 'body',
        autoPlay: true,
        mute: false,
        startAt: 0,
        opacity: 1,
        loop: true,
        showControls: false,
        showYTLogo: false,
        addRaster: false,
        quality: 'hd1080',
        optimizeDisplay: true,
        stopMovieOnBlur: false,
        realfullscreen: true,
        volume: 50
    }"></div>

    <!-- Затемняющий слой -->
    <div class="overlay"></div>

    <!-- ТОЛЬКО КНОПКА ЗВУКА (ПОЛЗУНОК УБРАН) -->
    <button class="sound-button" id="soundToggle">
        <i class="fas fa-volume-high" id="soundIcon"></i>
    </button>

    <!-- ПАНЕЛЬКА - ТЕМНАЯ И ПОЛУПРОЗРАЧНАЯ -->
    <div class="container">
        <h1>@psychodrain</h1>

        <div class="social-links">
            <a href="https://t.me/psychodrain" target="_blank" class="social-link telegram">
                <i class="fab fa-telegram-plane"></i> Telegram
            </a>
            
            <a href="https://www.youtube.com/@mishanya_atarax" target="_blank" class="social-link youtube">
                <i class="fab fa-youtube"></i> YouTube
            </a>
            
            <a href="https://tiktok.com/@kaceiiii" target="_blank" class="social-link tiktok">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
            
            <a href="https://vk.com/gang_tyumen" target="_blank" class="social-link vkontakte">
                <i class="fab fa-vk"></i> ВКонтакте
            </a>
            
            <a href="https://soundcloud.com/mishanyalirikov" target="_blank" class="social-link soundcloud">
                <i class="fab fa-soundcloud"></i> SoundCloud
            </a>
        </div>
    </div>

    <!-- Подключаем jQuery и YTPlayer -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mb.YTPlayer/3.3.9/jquery.mb.YTPlayer.min.js"></script>
    
    <script>
        $(document).ready(function() {
            // Активируем YouTube плеер
            $(".ytplayer").YTPlayer();
            
            let player = null;
            let isMuted = false;
            let currentVolume = 50;
            
            // Ждем загрузки плеера
            function waitForPlayer() {
                const ytPlayer = $(".ytplayer").data("ytPlayer");
                if (ytPlayer && ytPlayer.player) {
                    player = ytPlayer.player;
                    console.log("Player loaded!");
                    
                    // Устанавливаем начальную громкость
                    if (player.setVolume) {
                        player.setVolume(50);
                    }
                    
                    initButton();
                } else {
                    console.log("Waiting for player...");
                    setTimeout(waitForPlayer, 500);
                }
            }
            
            waitForPlayer();
            
            function initButton() {
                const soundToggle = document.getElementById('soundToggle');
                const soundIcon = document.getElementById('soundIcon');
                
                if (!player) return;
                
                // Кнопка mute/unmute
                soundToggle.addEventListener('click', function() {
                    if (!player || !player.getVolume) return;
                    
                    const vol = player.getVolume();
                    
                    if (vol > 0) {
                        // Выключаем звук
                        currentVolume = vol;
                        player.setVolume(0);
                        soundIcon.className = 'fas fa-volume-mute';
                        console.log("Muted");
                    } else {
                        // Включаем звук
                        player.setVolume(currentVolume);
                        soundIcon.className = 'fas fa-volume-high';
                        console.log("Unmuted to:", currentVolume);
                    }
                });
                
                // Следим за состоянием звука
                setInterval(() => {
                    if (player && player.getVolume) {
                        const vol = player.getVolume();
                        if (vol === 0) {
                            soundIcon.className = 'fas fa-volume-mute';
                        } else {
                            soundIcon.className = 'fas fa-volume-high';
                            currentVolume = vol;
                        }
                    }
                }, 200);
            }
        });
    </script>
</body>
</html>
