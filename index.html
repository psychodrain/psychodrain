<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>@psychodrain</title>
    <!-- Подключаем Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Подключаем CSS для YTPlayer -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jquery.mb.YTPlayer/3.3.9/css/jquery.mb.YTPlayer.min.css">
    <style>
        /* Стили для страницы */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: #000;
        }

        /* Затемнение поверх видео */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
            pointer-events: none;
        }

        /* ПАНЕЛЬКА - РАСШИРЕННАЯ ДЛЯ ТЕЛЕФОНА */
        .container {
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(12px);
            padding: 2.5rem 1.8rem;
            border-radius: 40px;
            text-align: center;
            max-width: 460px; /* УВЕЛИЧЕНО */
            width: 95%; /* ШИРЕ НА ТЕЛЕФОНЕ */
            margin: 15px;
            position: relative;
            z-index: 2;
            
            /* БЕЛОЕ НЕОНОВОЕ СВЕЧЕНИЕ */
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            box-shadow: 
                0 0 40px rgba(255, 255, 255, 0.4),
                0 0 80px rgba(255, 255, 255, 0.2),
                0 0 120px rgba(255, 255, 255, 0.1),
                inset 0 0 30px rgba(255, 255, 255, 0.2);
            
            /* Анимация пульсации */
            animation: neonPulse 3s ease-in-out infinite;
        }

        @keyframes neonPulse {
            0%, 100% {
                box-shadow: 
                    0 0 40px rgba(255, 255, 255, 0.4),
                    0 0 80px rgba(255, 255, 255, 0.2),
                    0 0 120px rgba(255, 255, 255, 0.1),
                    inset 0 0 30px rgba(255, 255, 255, 0.2);
            }
            50% {
                box-shadow: 
                    0 0 60px rgba(255, 255, 255, 0.7),
                    0 0 120px rgba(255, 255, 255, 0.4),
                    0 0 180px rgba(255, 255, 255, 0.2),
                    inset 0 0 40px rgba(255, 255, 255, 0.3);
            }
        }

        h1 {
            color: white;
            margin-bottom: 2rem;
            font-size: 2.4rem; /* ЧУТЬ БОЛЬШЕ */
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.7);
            letter-spacing: 1.5px;
            font-weight: 600;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 0.8rem;
            word-break: break-word; /* ПЕРЕНОС ЕСЛИ НУЖНО */
        }

        .social-links {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 1.1rem 1.2rem; /* ЧУТЬ БОЛЬШЕ ПАДДИНГ */
            border-radius: 60px; /* БОЛЕЕ СКРУГЛЕННЫЕ */
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 1.15rem; /* ЧУТЬ БОЛЬШЕ ШРИФТ */
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
            
            /* БЕЛОЕ НЕОНОВОЕ СВЕЧЕНИЕ */
            box-shadow: 
                0 0 15px rgba(255, 255, 255, 0.2),
                0 0 30px rgba(255, 255, 255, 0.1);
            
            /* ДЛЯ ТЕЛЕФОНА - УВЕЛИЧИВАЕМ ОБЛАСТЬ НАЖАТИЯ */
            min-height: 60px;
        }

        .social-link:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 
                0 0 30px rgba(255, 255, 255, 0.6),
                0 0 60px rgba(255, 255, 255, 0.3);
            filter: brightness(1.3);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .social-link:active {
            transform: scale(0.98); /* ЭФФЕКТ НАЖАТИЯ НА ТЕЛЕФОНЕ */
        }

        .social-link i {
            font-size: 1.5rem;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.5));
        }

        /* Индивидуальные цвета соцсетей */
        .telegram { background: linear-gradient(135deg, #0088cc, #006699); }
        .youtube { background: linear-gradient(135deg, #FF0000, #CC0000); }
        .tiktok { background: linear-gradient(135deg, #000000, #1a1a1a); }
        .vkontakte { background: linear-gradient(135deg, #4C75A3, #3a5a7a); }
        .soundcloud { background: linear-gradient(135deg, #FF7700, #CC5500); }

        /* МЕДИА-ЗАПРОС ДЛЯ ОЧЕНЬ МАЛЕНЬКИХ ЭКРАНОВ */
        @media (max-width: 380px) {
            .container {
                padding: 2rem 1.2rem;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .social-link {
                font-size: 1rem;
                padding: 1rem 0.8rem;
            }
            
            .social-link i {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <!-- YouTube фон со звуком - mute: false = звук сразу включен -->
    <div class="ytplayer" data-property="{
        videoURL: 'https://www.youtube.com/watch?v=WPxd8Ng9-x0',
        containment: 'body',
        autoPlay: true,
        mute: false,
        startAt: 0,
        opacity: 1,
        loop: true,
        showControls: false,
        showYTLogo: false,
        addRaster: false,
        quality: 'hd1080',
        optimizeDisplay: true,
        stopMovieOnBlur: false,
        realfullscreen: true,
        volume: 50
    }"></div>

    <!-- Затемняющий слой -->
    <div class="overlay"></div>

    <!-- ПАНЕЛЬКА - РАСШИРЕННАЯ -->
    <div class="container">
        <h1>@psychodrain</h1>

        <div class="social-links">
            <a href="https://t.me/psychodrain" target="_blank" class="social-link telegram">
                <i class="fab fa-telegram-plane"></i> Telegram
            </a>
            
            <a href="https://www.youtube.com/@mishanya_atarax" target="_blank" class="social-link youtube">
                <i class="fab fa-youtube"></i> YouTube
            </a>
            
            <a href="https://tiktok.com/@kaceiiii" target="_blank" class="social-link tiktok">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
            
            <a href="https://vk.com/gang_tyumen" target="_blank" class="social-link vkontakte">
                <i class="fab fa-vk"></i> ВКонтакте
            </a>
            
            <a href="https://soundcloud.com/mishanyalirikov" target="_blank" class="social-link soundcloud">
                <i class="fab fa-soundcloud"></i> SoundCloud
            </a>
        </div>
    </div>

    <!-- Подключаем jQuery и YTPlayer -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mb.YTPlayer/3.3.9/jquery.mb.YTPlayer.min.js"></script>
    
    <script>
        $(document).ready(function() {
            // Активируем YouTube плеер с звуком сразу
            $(".ytplayer").YTPlayer();
            
            let player = null;
            
            // Ждем загрузки плеера
            function waitForPlayer() {
                const ytPlayer = $(".ytplayer").data("ytPlayer");
                if (ytPlayer && ytPlayer.player) {
                    player = ytPlayer.player;
                    console.log("✅ Player loaded!");
                    
                    // Убеждаемся что звук включен
                    if (player.setVolume) {
                        player.unMute(); // Включаем звук если вдруг muted
                        player.setVolume(50);
                        console.log("🔊 Sound is ON");
                    }
                } else {
                    console.log("⏳ Waiting for player...");
                    setTimeout(waitForPlayer, 500);
                }
            }
            
            waitForPlayer();
        });
    </script>
</body>
</html>
